<!-- مثال internal CSS (در بخش head) -->
<!DOCTYPE html>
<html>
<head>
    <title>استایل پاراگراف</title>
    <style>
        p {
            color: darkgreen; /* رنگ متن */
            font-size: 16px; /* اندازه فونت */
            line-height: 1.5; /* فاصله بین خطوط */
            background-color: #f0f0f0; /* رنگ پس‌زمینه */
            padding: 10px; /* فضای داخلی (داخل کادر پاراگراف) */
            border: 1px solid gray; /* کادر اطراف پاراگراف */
        }
    </style>
</head>
<body>
    <p>این پاراگراف با استفاده از internal CSS استایل داده شده است. رنگ متن سبز تیره، اندازه فونت 16 پیکسل و فاصله بین خطوط 1.5 برابر اندازه فونت است. پس‌زمینه پاراگراف خاکستری روشن است.</p>
</body>
</html>
