<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقسیم صفحه با div</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      height: 100vh;
      background: #f2f2f2;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      gap: 10px;
      height: 100%;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .right {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .box {
      border-radius: 15px;
      padding: 20px;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .left .box {
      flex: 1;
    }

    .right .box {
      flex: 1;
    }

    .box1 { background: #e74c3c; }
    .box2 { background: #3498db; }
    .box3 { background: #2ecc71; }
    .box4 { background: #f39c12; }
    .box5 { background: #9b59b6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="box box1">بخش 1</div>
      <div class="box box2">بخش 2</div>
      <div class="box box3">بخش 3</div>
    </div>

    <div class="right">
      <div class="box box4">بخش بالا</div>
      <div class="box box5">بخش پایین</div>
    </div>
  </div>
</body>
</html>
