<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Tahoma;
        }
        td {
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
        }
        .row-1 { background-color: #f1c40f; }
        .row-2 { background-color: #3498db; color: white; }
        .row-3 { background-color: #2ecc71; }
    </style>
</head>
<body>

    <table>
        <!-- ردیف اول: فقط 1 ستون دارد، پس باید هر 5 ستون را اشغال کند -->
        <tr class="row-1">
            <td colspan="5">ردیف اول (یک ستون که عرض ۵ ستون را گرفته است)</td>
        </tr>

        <!-- ردیف دوم: 5 ستون کامل دارد -->
        <tr class="row-2">
            <td>ستون ۱</td>
            <td>ستون ۲</td>
            <td>ستون ۳</td>
            <td>ستون ۴</td>
            <td>ستون ۵</td>
        </tr>

        <!-- ردیف سوم: 2 ستون دارد. مثلا اولی عرض 2 ستون و دومی عرض 3 ستون را می‌گیرد (جمعاً 5) -->
        <tr class="row-3">
            <td colspan="2">ردیف سوم - بخش اول (عرض ۲ ستون)</td>
            <td colspan="3">ردیف سوم - بخش دوم (عرض ۳ ستون)</td>
        </tr>
    </table>

</body>
</html>
